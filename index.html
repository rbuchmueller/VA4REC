<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    svg { border: 1px solid #ccc; }
  </style>
</head>
<body>

<h3>User Embedding (PCA)</h3>

<label>Iteration:</label>
<input type="range" id="iter" min="1" max="5" step="1" value="1">
<span id="iter_val">1</span>

<br><br>

<label>Color:</label>
<select id="color_mode">
  <option value="drift">drift</option>
  <option value="us_proportion">us_proportion</option>
  <option value="local_proportion">local_proportion</option>
  <option value="bin_jsd">bin_jsd</option>
</select>

<br><br>

<svg id="plot" width="800" height="600"></svg>

<script src="app.js"></script>
</body>
</html>
